<div class="section-container">
  <header class="section-header">
    <div class="header-info">
      <h3>Procedimientos e Intervenciones</h3>
      <p>Cirugías, limpiezas y procedimientos programados.</p>
    </div>

    <p-button
      label="Agendar Procedimiento"
      icon="pi pi-calendar-plus"
      [rounded]="true"
      severity="help"
      [disabled]="store.bloqueado()"
      (onClick)="openCrear()"
    />
  </header>

  <p-table
    [value]="store.procedimientos()"
    styleClass="p-datatable-sm"
    [rowHover]="true"
  >
    <ng-template pTemplate="header">
      <tr>
        <th class="th-date">Fecha Programada</th>
        <th class="th-proc">Procedimiento</th>
        <th class="th-desc">Descripción</th>
        <th class="th-status">Estado</th>
        <th class="th-actions">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-item>
      <tr
        zoo-item-procedimiento
        [item]="item"
        [bloqueado]="store.bloqueado()"
        (edit)="openEditar($event)"
        (delete)="onDelete($event)"
      ></tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="empty-message">
          No hay procedimientos registrados en este historial.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
