<div class="section-container">
  <header class="section-header">
    <div class="header-info">
      <h3>Exámenes Complementarios</h3>
      <p>Laboratorio, Rayos X y Ecografías.</p>
    </div>

    <p-button
      label="Solicitar Examen"
      icon="pi pi-file-edit"
      [rounded]="true"
      severity="info"
      [disabled]="store.bloqueado()"
      (onClick)="openSolicitud()"
    />
  </header>

  <p-table
    [value]="store.ordenes()"
    styleClass="p-datatable-sm"
    [rowHover]="true"
    dataKey="id"
  >
    <ng-template pTemplate="header">
      <tr>
        <th class="th-date">Fecha / Tipo</th>
        <th class="th-instructions">Instrucciones</th>
        <th class="th-status">Estado</th>
        <th class="th-results">Resultados</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-item>
      <tr
        zoo-item-examen
        [item]="item"
        [bloqueado]="store.bloqueado()"
        (openUpload)="openSubirResultado($event)"
        (viewResult)="verResultado($event)"
      ></tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="empty-message">
          No se han solicitado exámenes para este paciente.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
