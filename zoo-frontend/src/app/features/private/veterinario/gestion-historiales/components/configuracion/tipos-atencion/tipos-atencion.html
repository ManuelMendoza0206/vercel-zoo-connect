<div class="page-container">
  <p-confirmDialog />

  <div class="page-header tour-vet-tipos-atencion-header">
    <h2 class="title">Tipos de Atención</h2>
    <div class="actions">
      <p-button
        styleClass="tour-vet-tipos-atencion-refresh-btn"
        icon="pi pi-refresh"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        pTooltip="Recargar lista"
        (onClick)="store.loadCatalogs()"
      />
      <p-button
        styleClass="tour-vet-tipos-atencion-new-btn"
        label="Nuevo"
        icon="pi pi-plus"
        [rounded]="true"
        severity="primary"
        (onClick)="openCreate()"
      />
      <p-button
        styleClass="tour-vet-tipos-atencion-tour-btn"
        label="Tour guiado"
        icon="pi pi-question-circle"
        [rounded]="true"
        severity="contrast"
        (onClick)="startGuidedTour()"
      />
    </div>
  </div>

  <div class="table-container">
    <p-table
      styleClass="tour-vet-tipos-atencion-table tour-vet-tipos-atencion-paginator p-datatable-sm"
      [value]="store.tiposAtencion()"
      [loading]="store.loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 20]"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 30%" class="tour-vet-tipos-atencion-col-nombre">Nombre</th>
          <th style="width: 50%" class="tour-vet-tipos-atencion-col-descripcion">Descripción</th>
          <th
            style="width: 20%"
            class="text-center tour-vet-tipos-atencion-col-acciones"
          >
            Acciones
          </th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr
          zoo-tipo-atencion-item
          [item]="item"
          (onEdit)="openEdit($event)"
          (onDelete)="deleteItem($event)"
        ></tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="empty-state">
            No hay tipos de atención registrados.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog
    styleClass="tour-vet-tipos-atencion-dialog dialog-form"
    [(visible)]="dialogVisible"
    [modal]="true"
    [style]="{ width: '450px' }"
    [draggable]="false"
    [resizable]="false"
  >
    <ng-template pTemplate="header">
      <div class="dialog-header-row tour-vet-tipos-atencion-dialog-header">
        <span>{{ isEditing() ? 'Editar Tipo de Atención' : 'Nuevo Tipo de Atención' }}</span>
        <p-button
          styleClass="tour-vet-tipos-atencion-form-tour-btn"
          label="Tour guiado"
          icon="pi pi-question-circle"
          [text]="true"
          [rounded]="true"
          (onClick)="startFormTour()"
        />
      </div>
    </ng-template>
    <form [formGroup]="form" class="form-content">
      <div class="field">
        <label for="nombre">Nombre <span class="required">*</span></label>
        <input
          pInputText
          id="nombre"
          class="tour-vet-tipos-atencion-campo-nombre"
          formControlName="nombre"
          placeholder="Ej: Consulta General"
        />
        @if (form.controls.nombre.dirty && form.controls.nombre.invalid) {
        <small class="error-msg"
          >El nombre es requerido (mínimo 3 caracteres).</small
        >
        }
      </div>

      <div class="field">
        <label for="descripcion">Descripción</label>
        <textarea
          pInputTextarea
          id="descripcion"
          class="tour-vet-tipos-atencion-campo-descripcion"
          formControlName="descripcion"
          rows="3"
          placeholder="Detalles adicionales..."
        ></textarea>
      </div>
    </form>

    <ng-template pTemplate="footer">
      <div class="dialog-footer">
        <p-button
          styleClass="tour-vet-tipos-atencion-cancel-btn"
          label="Cancelar"
          icon="pi pi-times"
          [text]="true"
          (onClick)="dialogVisible.set(false)"
          [rounded]="true"
        />
        <p-button
          styleClass="tour-vet-tipos-atencion-save-btn"
          label="Guardar"
          icon="pi pi-check"
          [text]="true"
          [disabled]="form.invalid"
          (onClick)="save()"
          [rounded]="true"
        />
      </div>
    </ng-template>
  </p-dialog>
</div>
