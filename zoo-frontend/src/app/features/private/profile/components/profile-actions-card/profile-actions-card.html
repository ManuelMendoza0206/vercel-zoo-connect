<p-card class="actions-card">
  <div class="buttons-header">
    <p-button
      label="Editar"
      icon="pi pi-pencil"
      severity="primary"
      [rounded]="true"
      styleClass="w-full tour-profile-edit-btn"
      (click)="onEditProfile()"
      [disabled]="disabledActions()?.edit"
      [pTooltip]="tooltips()?.edit"
      [tooltipDisabled]="!disabledActions()?.edit"
      fluid
    />
    <p-button
      label="Compartir"
      icon="pi pi-share-alt"
      severity="primary"
      [rounded]="true"
      styleClass="w-full tour-profile-share-btn"
      (click)="onShareProfile()"
      [disabled]="disabledActions()?.share"
      [pTooltip]="tooltips()?.share"
      [tooltipDisabled]="!disabledActions()?.share"
      fluid
    />
    <!-- Botón de tour al lado del de compartir -->
    <p-button
      icon="pi pi-question-circle"
      severity="help"
      [rounded]="true"
      (click)="startTour.emit()"
      pTooltip="Ver tour del perfil"
      tooltipPosition="bottom"
    />
  </div>

  <p-divider />

  <div class="menu-options">
    <p-button
      label="Mis Participaciones"
      icon="pi pi-history"
      styleClass="menu-option tour-profile-participations"
      variant="text"
      (click)="onViewParticipations()"
      [rounded]="true"
    />
  </div>

  <p-divider />

  <p-button
    label="Cerrar Sesión"
    icon="pi pi-sign-out"
    severity="danger"
    [rounded]="true"
    [text]="true"
    styleClass="w-full logout-btn tour-profile-logout"
    (click)="onLogout()"
  />
</p-card>
