<div class="home-page">
  <app-hero-section />

  @defer (on viewport) {
  <div class="tour-public-home-gallery">
    <app-carousel />
  </div>
  } @placeholder {
  <div style="height: 400px; background: var(--p-surface-ground)"></div>
  } @defer (on viewport) {
  <div class="tour-public-home-programs">
    <app-services-section />
  </div>
  } @placeholder {
  <div style="height: 300px"></div>
  } @defer (on viewport) {
  <div class="tour-public-home-news">
    <app-noticias-section />
  </div>
  } @placeholder {
  <div style="height: 400px"></div>
  } @defer (on viewport) {
  <div class="tour-public-home-weather">
    <app-weather-section />
  </div>
  } @placeholder {
  <div style="height: 200px"></div>
  } @defer (on viewport) {
  <div class="tour-public-home-contact">
    <app-contact-section (submitContact)="onSubmitContact()" />
  </div>
  } @placeholder {
  <div style="height: 500px"></div>
  } @defer (on viewport) {
  <div class="tour-public-home-social">
    <app-social-section />
  </div>
  } @placeholder {
  <div style="height: 100px"></div>
  }
</div>
